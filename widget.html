<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thera Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      /* Drag handled via JS (mousedown → move-widget IPC) */

      /* Border draw: stroke-dashoffset 1→0 (pathLength=1 normalises any shape) */
      @keyframes borderDraw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/widget.jsx"></script>
  </body>
</html>
