<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Thera Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f0d0b;
      color: #f0e6d2;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #e8603a;
      box-shadow: 0 0 6px #e8603a99;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .title { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
    .title span { color: #e8603a; }
    .status {
      font-size: 11px; color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      margin-bottom: 12px;
    }
    .status.connected { color: #4ade80; }
    .status.disconnected { color: rgba(255,255,255,0.25); }
    .tab-info {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      line-height: 1.5;
      word-break: break-all;
    }
    .tab-title {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <div class="title">thera<span>.</span></div>
  </div>
  <div class="status" id="status">checking connection...</div>
  <div id="tab-info"></div>
  <script src="popup.js"></script>
</body>
</html>
